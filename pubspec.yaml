name: record_everything
description: "A unified life items, bills and reminders manager."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Localization
  flutter_localizations:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  # Routing
  go_router: ^14.8.1
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  # Charts
  fl_chart: ^0.69.2
  # Date/Time
  intl: ^0.20.2
  # JSON
  json_annotation: ^4.9.0
  # File access
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  add_2_calendar: 3.1.0  # pinned: 3.1.1's android/build.gradle.kts uses an incompatible `kotlin { compilerOptions }` DSL (missing kotlin plugin + AGP 9.0.1/Kotlin 2.3.20). 3.1.0 uses the legacy Groovy build.gradle and the same Dart API.
  shared_preferences: ^2.5.5
  http: ^1.6.0
  image_picker: ^1.2.2
  receive_sharing_intent: ^1.8.1
  speech_to_text: ^7.4.0
  flutter_secure_storage: ^10.3.1
  google_mlkit_text_recognition: ^0.15.1
  home_widget: ^0.9.3
  # WebDAV
  webdav_client: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  # Project-local custom lint that prevents disposable Flutter resources
  # (TextEditingController, ScrollController, FocusNode, ...) from being
  # created as locals inside functions/methods.
  disposable_resource_lint:
    path: tools/disposable_resource_lint
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
