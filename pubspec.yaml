name: record_everything
description: "A unified life items, bills and reminders manager."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  # Routing
  go_router: ^14.8.1
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  # Charts
  fl_chart: ^0.69.2
  # Date/Time
  intl: ^0.19.0
  # JSON
  json_annotation: ^4.9.0
  # File access
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
